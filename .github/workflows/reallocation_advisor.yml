name: Portfolio Reallocation Advisor

on:
  schedule:
    # Runs every weekday at 09h00 UTC — Python checks if it's the last business day
    - cron: '0 9 28-31 * 1-5'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  advise:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reallocation advisor
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          PORTFOLIO:           ${{ secrets.PORTFOLIO }}
          NEXT_HORIZON:        ${{ secrets.NEXT_HORIZON }}
          TREND_SPOTTING:      ${{ secrets.TREND_SPOTTING }}
          VALUE_UNDERFLOW:     ${{ secrets.VALUE_UNDERFLOW }}
        run: python reallocation_advisor.py
